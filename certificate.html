<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificates — VidX</title>
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap');
    :root{--bg:#03040a;--bg2:#080c14;--bg3:#0d1220;--neon-purple:#8b5cf6;--neon-blue:#3b82f6;--neon-cyan:#06b6d4;--neon-green:#10b981;--glow-purple:rgba(139,92,246,0.35);--text:#f1f5f9;--muted:#64748b;--border:rgba(255,255,255,0.06);--border-glow:rgba(139,92,246,0.3);--sidebar-w:260px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--neon-purple);border-radius:2px}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none;z-index:0}.orb-1{width:300px;height:300px;background:#10b981;bottom:10%;right:10%}
    .layout{display:flex;min-height:100vh;position:relative;z-index:1}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 0;z-index:100;overflow-y:auto}
    .sidebar-logo{display:flex;align-items:center;gap:.6rem;padding:0 1.5rem 1.5rem;font-weight:800;font-size:1.3rem;text-decoration:none;color:var(--text);border-bottom:1px solid var(--border)}
    .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--neon-purple),var(--neon-blue));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem}
    .nav-section{padding:1rem 0}.nav-label{padding:0 1.5rem;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.5rem}
    .nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.5rem;color:var(--muted);text-decoration:none;font-weight:600;font-size:.9rem;border-left:3px solid transparent;transition:all .2s}
    .nav-item:hover{color:var(--text);background:rgba(139,92,246,.05)}.nav-item.active{color:var(--text);border-left-color:var(--neon-purple);background:rgba(139,92,246,.08)}
    .sidebar-user{margin-top:auto;padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
    .user-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--neon-purple),var(--neon-blue));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}
    .main{margin-left:var(--sidebar-w);flex:1;padding:2rem}
    .mobile-topbar{display:none;align-items:center;gap:1rem;padding:1rem;background:var(--bg2);border-bottom:1px solid var(--border)}
    .hamburger{background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}
    .page-title{font-size:1.8rem;font-weight:800;margin-bottom:2rem}
    .tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
    .tier-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center;transition:all .3s}
    .tier-card.unlocked{border-color:var(--border-glow);box-shadow:0 0 20px var(--glow-purple)}
    .tier-card.locked{opacity:.5}
    .tier-icon{font-size:2rem;margin-bottom:.5rem}.tier-name{font-weight:800;margin-bottom:.25rem}.tier-xp{font-size:.85rem;color:var(--muted)}
    .cert-display{max-width:700px;margin:0 auto}
    .certificate{background:var(--bg2);border:3px double var(--neon-purple);border-radius:20px;padding:3rem;text-align:center;box-shadow:0 0 40px var(--glow-purple);position:relative}
    .cert-border{position:absolute;inset:12px;border:1px solid rgba(139,92,246,.3);border-radius:14px;pointer-events:none}
    .cert-logo{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--neon-purple),var(--neon-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
    .cert-title{font-size:1.5rem;font-weight:800;margin-bottom:.5rem;color:var(--neon-cyan)}
    .cert-name{font-size:2rem;font-weight:800;margin:1rem 0;background:linear-gradient(135deg,#fff,var(--neon-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .cert-detail{color:var(--muted);margin:.5rem 0;font-size:.95rem}
    .cert-xp{font-family:'JetBrains Mono',monospace;font-size:1.2rem;color:var(--neon-green);margin:1rem 0}
    .btn{padding:.65rem 1.4rem;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--neon-purple),var(--neon-blue));color:#fff;margin-top:1.5rem}
    .locked-state{text-align:center;padding:3rem;background:var(--bg2);border:1px solid var(--border);border-radius:16px;max-width:500px;margin:0 auto}
    .locked-state h3{font-size:1.3rem;margin-bottom:1rem}
    .progress-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:1rem 0}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--neon-purple),var(--neon-blue));border-radius:4px}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999}.overlay.show{display:block}
    @media(max-width:768px){.sidebar{transform:translateX(-100%);transition:transform .3s;z-index:1000}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:1rem}.mobile-topbar{display:flex}.tiers{grid-template-columns:1fr}.certificate{padding:2rem 1.5rem}}
    @media print{body{background:#fff;color:#000}.sidebar,.mobile-topbar,.tiers,.btn,.orb{display:none!important}.main{margin:0;padding:0}.certificate{border:3px double #8b5cf6;box-shadow:none;background:#fff;color:#000}.cert-name,.cert-logo{-webkit-text-fill-color:#000;color:#000}}
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <a href="dashboard.html" class="sidebar-logo"><div class="logo-icon">VX</div>VidX</a>
      <div class="nav-section"><div class="nav-label">Main</div>
        <a href="dashboard.html" class="nav-item">🏠 Dashboard</a><a href="problems.html" class="nav-item">📚 Problem Library</a><a href="problem.html" class="nav-item">⚡ Daily Problem</a>
        <a href="leaderboard.html" class="nav-item">🏆 Leaderboard</a><a href="sadhana.html" class="nav-item">🧘 Sadhana Mode</a>
      </div>
      <div class="nav-section"><div class="nav-label">Community</div>
        <a href="battles.html" class="nav-item">👥 Battles</a><a href="knowledge-hub.html" class="nav-item">🎓 Knowledge Hub</a>
        <a href="discussions.html" class="nav-item">💬 Discussions</a>
      </div>
      <div class="nav-section"><div class="nav-label">Account</div>
        <a href="profile.html" class="nav-item">👤 My Profile</a><a href="certificate.html" class="nav-item active">📜 Certificates</a>
        <a href="#" class="nav-item" onclick="logout();return false">🚪 Log Out</a>
      </div>
      <div class="sidebar-user"><div class="user-av" id="sidebarAv">?</div><div><div style="font-weight:700" id="sidebarName">—</div></div></div>
    </aside>
    <div class="main">
      <div class="mobile-topbar"><button class="hamburger" onclick="toggleSidebar()">☰</button><strong>Certificates</strong></div>
      <h1 class="page-title" data-aos="fade-up">📜 Your Certificates</h1>
      <div class="tiers" data-aos="fade-up" id="tiersGrid"></div>
      <div class="cert-display" id="certDisplay" data-aos="fade-up"><p style="color:var(--muted);text-align:center">Loading...</p></div>
    </div>
  </div>
  <script src="supabase.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({duration:700,once:true,offset:80});
    function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
    function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
    const CERTS=[{xp:500,icon:'🥉',name:'Beginner Certificate',level:'Debug Warrior'},{xp:2000,icon:'🥈',name:'Intermediate Certificate',level:'Code Samurai'},{xp:5000,icon:'🏆',name:'Master Certificate',level:'Legend'}];
    async function onDbReady(){
      const user=await requireAuth();if(!user)return;
      const profile=await getUserProfile(user.id);if(!profile)return;
      document.getElementById('sidebarAv').textContent=getInitials(profile.first_name,profile.last_name);
      document.getElementById('sidebarName').textContent=`${profile.first_name||''} ${profile.last_name||''}`.trim();
      const xp=profile.xp||0;
      const qualified=CERTS.filter(c=>xp>=c.xp);
      const nextCert=CERTS.find(c=>xp<c.xp);
      document.getElementById('tiersGrid').innerHTML=CERTS.map(c=>`
        <div class="tier-card ${xp>=c.xp?'unlocked':'locked'}"><div class="tier-icon">${c.icon}</div><div class="tier-name">${c.name}</div><div class="tier-xp">${c.xp.toLocaleString()} XP required</div></div>
      `).join('');
      if(qualified.length){
        const best=qualified[qualified.length-1];
        const fullName=`${profile.first_name||''} ${profile.last_name||''}`.trim();
        document.getElementById('certDisplay').innerHTML=`
          <div class="certificate" id="printCert"><div class="cert-border"></div>
            <div class="cert-logo">VidX</div>
            <div class="cert-title">${best.icon} ${best.name}</div>
            <p class="cert-detail">This certifies that</p>
            <div class="cert-name">${fullName}</div>
            <p class="cert-detail">has achieved <strong>${best.level}</strong> level</p>
            <div class="cert-xp">${xp.toLocaleString()} XP earned</div>
            <p class="cert-detail">${profile.college||'VidX College'} · ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</p>
            <button class="btn" onclick="window.print()">Download PDF ↓</button>
          </div>`;
      }else{
        const needed=nextCert.xp-xp;const pct=Math.round((xp/nextCert.xp)*100);
        document.getElementById('certDisplay').innerHTML=`
          <div class="locked-state"><div style="font-size:3rem;margin-bottom:1rem">🔒</div><h3>Certificate Locked</h3>
          <p style="color:var(--muted)">Earn ${needed.toLocaleString()} more XP to unlock the ${nextCert.name}</p>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <p style="font-size:.85rem;color:var(--muted)">${xp.toLocaleString()} / ${nextCert.xp.toLocaleString()} XP</p></div>`;
      }
    }
  </script>
</body>
</html>
