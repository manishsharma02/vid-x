<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — VidX</title>
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
<link rel="stylesheet" href="animations.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap');
    :root{--bg:#03040a;--bg2:#080c14;--bg3:#0d1220;--neon-blue:#3b82f6;--neon-purple:#8b5cf6;--neon-cyan:#06b6d4;--neon-pink:#ec4899;--neon-green:#10b981;--glow-purple:rgba(139,92,246,0.35);--text:#f1f5f9;--muted:#64748b;--border:rgba(255,255,255,0.06);--border-glow:rgba(139,92,246,0.3);--sidebar-w:260px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .mono{font-family:'JetBrains Mono',monospace}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--neon-purple);border-radius:2px}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none;z-index:0}
    .orb-1{width:400px;height:400px;background:#8b5cf6;top:-100px;right:-100px}
    .layout{display:flex;min-height:100vh;position:relative;z-index:1}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 0;z-index:100;overflow-y:auto}
    .sidebar-logo{display:flex;align-items:center;gap:.6rem;padding:0 1.5rem 1.5rem;font-weight:800;font-size:1.3rem;text-decoration:none;color:var(--text);border-bottom:1px solid var(--border)}
    .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--neon-purple),var(--neon-blue));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem}
    .nav-section{padding:1rem 0}.nav-label{padding:0 1.5rem;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.5rem}
    .nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.5rem;color:var(--muted);text-decoration:none;font-weight:600;font-size:.9rem;border-left:3px solid transparent;transition:all .2s}
    .nav-item:hover{color:var(--text);background:rgba(139,92,246,.05)}.nav-item.active{color:var(--text);border-left-color:var(--neon-purple);background:rgba(139,92,246,.08)}
    .sidebar-user{margin-top:auto;padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
    .user-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--neon-purple),var(--neon-blue));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}
    .main{margin-left:var(--sidebar-w);flex:1;padding:2rem}
    .mobile-topbar{display:none;align-items:center;gap:1rem;padding:1rem;background:var(--bg2);border-bottom:1px solid var(--border)}
    .hamburger{background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}
    .page-title{font-size:1.8rem;font-weight:800;margin-bottom:.5rem}
    .your-rank-bar{background:rgba(139,92,246,.1);border:1px solid var(--border-glow);border-radius:16px;padding:1rem 1.5rem;margin-bottom:2rem;display:flex;align-items:center;justify-content:space-between}
    .filters{display:flex;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap}
    .filter-btn{padding:.5rem 1rem;background:var(--bg2);border:1px solid var(--border);border-radius:100px;color:var(--muted);font-family:'Syne',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer}
    .filter-btn.active{background:rgba(139,92,246,.15);border-color:var(--neon-purple);color:var(--text)}
    .podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:2rem;align-items:end}
    .podium-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center;transition:transform .3s}
    .podium-card.first{transform:translateY(-20px);border-color:rgba(251,191,36,.4);box-shadow:0 0 25px rgba(251,191,36,.15)}
    .podium-card.second{border-color:rgba(148,163,184,.4)}.podium-card.third{border-color:rgba(180,83,9,.4)}
    .podium-rank{font-size:2rem;margin-bottom:.5rem}
    .podium-av{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--neon-purple),var(--neon-blue));display:flex;align-items:center;justify-content:center;font-weight:700;margin:0 auto .75rem;font-size:1.1rem}
    .podium-name{font-weight:800;margin-bottom:.25rem}.podium-xp{font-family:'JetBrains Mono',monospace;color:var(--neon-cyan);font-size:.9rem}
    .table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{padding:1rem;text-align:left;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3)}
    td{padding:1rem;border-bottom:1px solid var(--border);font-size:.9rem}
    tr:hover td{background:rgba(139,92,246,.03)}
    tr.you td{background:rgba(139,92,246,.1)}
    .badge{display:inline-block;padding:.2rem .6rem;border-radius:100px;font-size:.75rem;font-weight:700;background:rgba(139,92,246,.15);color:var(--neon-purple)}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999}.overlay.show{display:block}
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%);transition:transform .3s;z-index:1000}.sidebar.open{transform:translateX(0)}
      .main{margin-left:0;padding:1rem}.mobile-topbar{display:flex}.podium{grid-template-columns:1fr}
      .podium-card.first{transform:none}table{font-size:.8rem}th,td{padding:.6rem}
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <a href="dashboard.html" class="sidebar-logo"><div class="logo-icon">VX</div>VidX</a>
      <div class="nav-section"><div class="nav-label">Main</div>
        <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
        <a href="problems.html" class="nav-item">📚 Problem Library</a>
        <a href="problem.html" class="nav-item">⚡ Daily Problem</a>
        <a href="leaderboard.html" class="nav-item active">🏆 Leaderboard</a>
        <a href="sadhana.html" class="nav-item">🧘 Sadhana Mode</a>
      </div>
      <div class="nav-section"><div class="nav-label">Community</div>
        <a href="battles.html" class="nav-item">👥 Battles</a>
        <a href="knowledge-hub.html" class="nav-item">🎓 Knowledge Hub</a>
        <a href="discussions.html" class="nav-item">💬 Discussions</a>
      </div>
      <div class="nav-section"><div class="nav-label">Account</div>
        <a href="profile.html" class="nav-item">👤 My Profile</a>
        <a href="certificate.html" class="nav-item">📜 Certificates</a>
        <a href="#" class="nav-item" onclick="logout();return false">🚪 Log Out</a>
      </div>
      <div class="sidebar-user"><div class="user-av" id="sidebarAv">?</div><div><div style="font-weight:700" id="sidebarName">—</div><div style="font-size:.75rem;color:var(--neon-purple)" id="sidebarRank">—</div></div></div>
    </aside>
    <div class="main">
      <div class="mobile-topbar"><button class="hamburger" onclick="toggleSidebar()">☰</button><strong>Leaderboard</strong></div>
      <h1 class="page-title" data-aos="fade-up">🏆 College Leaderboard</h1>
      <div class="your-rank-bar" data-aos="fade-up" id="yourRankBar">Loading your rank...</div>
      <div class="filters" data-aos="fade-up">
        <button class="filter-btn active" onclick="filterBoard('all',this)">All</button>
        <button class="filter-btn" onclick="filterBoard('Beginner',this)">Beginner</button>
        <button class="filter-btn" onclick="filterBoard('Intermediate',this)">Intermediate</button>
        <button class="filter-btn" onclick="filterBoard('Advanced',this)">Advanced</button>
      </div>
      <div class="podium" id="podium" data-aos="fade-up"></div>
      <div class="table-wrap" data-aos="fade-up">
        <table><thead><tr><th>Rank</th><th>Student</th><th>XP</th><th>Streak</th><th>Badge</th><th>Change</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" style="text-align:center;color:var(--muted)">Loading...</td></tr></tbody></table>
      </div>
    </div>
  </div>
  <script src="supabase.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="animations.js"></script>
  <script>
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
    function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
    let allStudents=[],currentUserId=null,currentFilter='all';
    async function onDbReady(){
      const user=await requireAuth();if(!user)return;currentUserId=user.id;
      const profile=await getUserProfile(user.id);
      document.getElementById('sidebarAv').textContent=getInitials(profile?.first_name,profile?.last_name);
      document.getElementById('sidebarName').textContent=`${profile?.first_name||''} ${profile?.last_name||''}`.trim();
      document.getElementById('sidebarRank').textContent=profile?.rank_title||'Newbie';
      allStudents=await getLeaderboard(100);
      renderBoard();
    }
    function filterBoard(f,btn){
      currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderBoard();
    }
    function getFiltered(){
      if(currentFilter==='all')return allStudents;
      return allStudents.filter(s=>getStudentLearningLevel(s)===currentFilter);
    }
    function renderBoard(){
      const students=getFiltered();
      const myIdx=students.findIndex(s=>s.id===currentUserId);
      const myRank=myIdx>=0?myIdx+1:null;
      const me=students[myIdx];
      document.getElementById('yourRankBar').innerHTML=myRank
        ?`<span>Your Rank: <strong class="mono">#${myRank}</strong></span><span>${(me?.xp||0).toLocaleString()} XP · ${me?.streak||0} day streak</span>`
        :'<span>Not ranked yet — solve a problem to appear!</span>';
      const medals=['🥇','🥈','🥉'];const classes=['second','first','third'];
      const podiumOrder=[1,0,2];
      document.getElementById('podium').innerHTML=podiumOrder.map(i=>{
        const s=students[i];if(!s)return '<div></div>';
        const name=`${s.first_name||''} ${s.last_name||''}`.trim()||s.email;
        return `<div class="podium-card ${classes[i]}"><div class="podium-rank">${medals[i]}</div><div class="podium-av">${getInitials(s.first_name,s.last_name)}</div><div class="podium-name">${name}</div><div class="podium-xp">${(s.xp||0).toLocaleString()} XP</div></div>`;
      }).join('');
      document.getElementById('tableBody').innerHTML=students.map((s,i)=>{
        const name=`${s.first_name||''} ${s.last_name||''}`.trim()||s.email;
        const isYou=s.id===currentUserId;
        return `<tr class="${isYou?'you':''}"><td class="mono">#${i+1}</td><td>${name}${isYou?' (You)':''}</td><td class="mono">${(s.xp||0).toLocaleString()}</td><td>🔥 ${s.streak||0}</td><td><span class="badge">${s.rank_title||'Newbie'}</span></td><td style="color:var(--neon-green)">—</td></tr>`;
      }).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--muted)">No students yet</td></tr>';
    }
  </script>
</body>
</html>
